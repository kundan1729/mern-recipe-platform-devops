alertmanager:
  enabled: true
  alertmanagerSpec:
    secrets:
      - alertmanager-notifications
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default-email'
      routes:
        - matchers:
            - severity = "critical"
          receiver: 'critical-slack'
    receivers:
      - name: 'default-email'
        email_configs:
          - to: 'your-email@example.com'
            from: 'your-email@example.com'
            smarthost: 'smtp.gmail.com:587'
            auth_username: 'your-email@example.com'
            auth_identity: 'your-email@example.com'
            auth_password_file: '/etc/alertmanager/secrets/alertmanager-notifications/gmail-app-password'
            require_tls: true
      - name: 'critical-slack'
        slack_configs:
          - api_url_file: '/etc/alertmanager/secrets/alertmanager-notifications/slack-webhook-url'
            channel: '#alerts'
            send_resolved: true
            title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}{{ end }}'
