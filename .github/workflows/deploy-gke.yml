name: CI/CD Deploy to GKE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: gke-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GAR_LOCATION: ${{ vars.GAR_LOCATION }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
  GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
  GKE_LOCATION: ${{ vars.GKE_LOCATION }}
  WIF_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  WIF_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
  GKE_NAMESPACE: mern-app

jobs:
  validate:
    name: Validate Frontend and Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install and lint frontend
        working-directory: ./recipe-client-dev
        run: |
          npm install --no-audit --no-fund
          npm run lint

      - name: Typecheck frontend
        working-directory: ./recipe-client-dev
        run: npm run typecheck

      - name: Install backend dependencies
        working-directory: ./recipe-server-dev
        run: npm install --no-audit --no-fund

  build-and-deploy:
    name: Build, Push, and Deploy
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required CI/CD variables
        run: |
          required_vars=(PROJECT_ID GAR_LOCATION GAR_REPOSITORY GKE_CLUSTER GKE_LOCATION WIF_PROVIDER WIF_SERVICE_ACCOUNT)
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "::error::Missing required repository variable: ${var_name}"
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${GAR_LOCATION}-docker.pkg.dev --quiet

      - name: Set image tags
        run: |
          echo "BACKEND_IMAGE=${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${GAR_REPOSITORY}/backend:${GITHUB_SHA}" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${GAR_REPOSITORY}/frontend:${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build backend image
        run: docker build -t "$BACKEND_IMAGE" ./recipe-server-dev

      - name: Push backend image
        run: docker push "$BACKEND_IMAGE"

      - name: Build frontend image
        run: docker build -t "$FRONTEND_IMAGE" ./recipe-client-dev

      - name: Push frontend image
        run: docker push "$FRONTEND_IMAGE"

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Apply cluster manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/backend/backend-service.yaml
          kubectl apply -f k8s/frontend/frontend-service.yaml
          kubectl apply -f k8s/backend/backend-deployment.yaml
          kubectl apply -f k8s/frontend/frontend-deployment.yaml
          kubectl apply -f k8s/autoscaling/hpa.yaml
          kubectl apply -f k8s/ingress/ingress.yaml

      - name: Update backend image
        run: |
          kubectl set image deployment/backend-deployment backend="$BACKEND_IMAGE" -n "$GKE_NAMESPACE"

      - name: Update frontend image
        run: |
          kubectl set image deployment/frontend-deployment frontend="$FRONTEND_IMAGE" -n "$GKE_NAMESPACE"

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend-deployment -n "$GKE_NAMESPACE"
          kubectl rollout status deployment/frontend-deployment -n "$GKE_NAMESPACE"

      - name: Show ingress endpoint
        run: kubectl get ingress mern-app-ingress -n "$GKE_NAMESPACE"